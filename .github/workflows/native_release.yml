name: Native Build & Release

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "google-ai-edge/LiteRT-LM tag to package"
        required: true
        type: string
      prerelease:
        description: "Publish as a prerelease"
        required: false
        default: false
        type: boolean
      target_platform:
        description: "Runtime platform to build, or all"
        required: false
        default: all
        type: string
      target_arch:
        description: "Runtime arch to build, or all"
        required: false
        default: all
        type: string

permissions:
  contents: write

jobs:
  runtime-matrix:
    name: Prepare runtime matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        shell: python
        run: |
          import json
          import os

          targets = [
              {"os": "macos-latest", "platform": "macos", "arch": "arm64", "jobs": "3"},
              {"os": "macos-13", "platform": "macos", "arch": "x64", "jobs": "3"},
              {"os": "ubuntu-latest", "platform": "linux", "arch": "x64", "jobs": "3"},
              {"os": "ubuntu-24.04-arm", "platform": "linux", "arch": "arm64", "jobs": "3"},
              {"os": "windows-latest", "platform": "windows", "arch": "x64", "jobs": "3"},
              {"os": "ubuntu-latest", "platform": "android", "arch": "arm64", "jobs": "3"},
              {"os": "ubuntu-latest", "platform": "android", "arch": "x64", "jobs": "3"},
          ]
          platform = "${{ inputs.target_platform }}"
          arch = "${{ inputs.target_arch }}"
          selected = [
              target for target in targets
              if (platform == "all" or target["platform"] == platform)
              and (arch == "all" or target["arch"] == arch)
          ]
          if not selected:
              raise SystemExit(f"No runtime targets matched {platform}/{arch}")
          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps({'include': selected})}\n")

  build-upstream-runtime:
    name: Build upstream runtime (${{ matrix.platform }}-${{ matrix.arch }})
    needs: runtime-matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.runtime-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js for Bazelisk fallback
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Android NDK
        id: setup-ndk
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28b
          add-to-path: false

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
            ~/Library/Caches/bazelisk
            .bazel-output-root
          key: bazel-${{ runner.os }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ inputs.upstream_tag }}-${{ hashFiles('tools/build_upstream_runtime.py') }}
          restore-keys: |
            bazel-${{ runner.os }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ inputs.upstream_tag }}-

      - name: Build upstream LiteRT-LM runtime
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          BAZEL_OUTPUT_USER_ROOT: ${{ github.workspace }}/.bazel-output-root
        run: |
          python3 tools/build_upstream_runtime.py \
            --upstream-tag "${{ inputs.upstream_tag }}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --jobs "${{ matrix.jobs }}"

      - uses: actions/upload-artifact@v4
        with:
          name: upstream-runtime-${{ matrix.platform }}-${{ matrix.arch }}
          path: bin

  build-shim:
    name: Build shim (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
            library: liblitert_lm_native.dylib
            output: build/scaffold/liblitert_lm_native.dylib
          - os: ubuntu-latest
            platform: linux
            arch: x64
            library: liblitert_lm_native.so
            output: build/scaffold/liblitert_lm_native.so
          - os: windows-latest
            platform: windows
            arch: x64
            library: litert_lm_native.dll
            output: build/scaffold/Release/litert_lm_native.dll
    steps:
      - uses: actions/checkout@v4

      - name: Configure scaffold shim
        run: cmake -S . -B build/scaffold -DLITERT_LM_NATIVE_BUILD_SHIM=ON

      - name: Build scaffold shim
        run: cmake --build build/scaffold --config Release --parallel 4

      - name: Stage shim artifact
        shell: bash
        run: |
          mkdir -p "shim-bin/${{ matrix.platform }}/${{ matrix.arch }}"
          cp "${{ matrix.output }}" \
            "shim-bin/${{ matrix.platform }}/${{ matrix.arch }}/${{ matrix.library }}"

      - uses: actions/upload-artifact@v4
        with:
          name: shim-${{ matrix.platform }}-${{ matrix.arch }}
          path: shim-bin

  package:
    if: inputs.target_platform == 'all' && inputs.target_arch == 'all'
    needs:
      - build-upstream-runtime
      - build-shim
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package upstream prebuilt libraries
        run: |
          python3 tools/package_upstream_prebuilts.py \
            --upstream-tag "${{ inputs.upstream_tag }}" \
            --clean

      - uses: actions/download-artifact@v4
        with:
          pattern: shim-*
          path: shim-bin
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: upstream-runtime-*
          path: runtime-bin
          merge-multiple: true

      - name: Add upstream runtime libraries to package
        run: |
          cp -R runtime-bin/* bin/

      - name: Add shim libraries to package
        run: |
          cp -R shim-bin/* bin/

      - name: Package official upstream release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 tools/package_official_release_assets.py \
            --upstream-tag "${{ inputs.upstream_tag }}" \
            --clean

      - name: Generate manifest and checksums
        run: |
          python3 tools/validate_runtime_artifacts.py --upstream-tag "${{ inputs.upstream_tag }}"
          python3 tools/package_release.py --upstream-tag "${{ inputs.upstream_tag }}"
          python3 tools/validate_artifacts.py

      - name: Create release archives
        run: |
          mkdir -p release
          tar -czf "release/litert-lm-native-prebuilts-${{ inputs.upstream_tag }}.tar.gz" \
            bin manifest.json SHA256SUMS
          if [ -d dist ]; then
            tar -czf "release/litert-lm-native-official-assets-${{ inputs.upstream_tag }}.tar.gz" \
              dist
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=()
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          notes="Packaged LiteRT-LM upstream runtime libraries, upstream prebuilts, and official release assets for ${{ inputs.upstream_tag }}."
          if gh release view "${{ inputs.upstream_tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "${{ inputs.upstream_tag }}" \
              --repo "${{ github.repository }}" \
              --title "LiteRT-LM ${{ inputs.upstream_tag }}" \
              --notes "$notes" \
              "${args[@]}"
            gh release upload "${{ inputs.upstream_tag }}" \
              --repo "${{ github.repository }}" \
              --clobber \
              release/* \
              manifest.json \
              SHA256SUMS
          else
            gh release create "${{ inputs.upstream_tag }}" \
              --repo "${{ github.repository }}" \
              --title "LiteRT-LM ${{ inputs.upstream_tag }}" \
              --notes "$notes" \
              "${args[@]}" \
              release/* \
              manifest.json \
              SHA256SUMS
          fi
