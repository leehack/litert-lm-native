name: Native Build & Release

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "google-ai-edge/LiteRT-LM tag to package"
        required: true
        type: string
      release_tag:
        description: "Native release tag to publish; defaults to upstream_tag"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Publish as a prerelease"
        required: false
        default: false
        type: boolean
      target_platform:
        description: "Runtime platform to build, or all"
        required: false
        default: all
        type: string
      target_arch:
        description: "Runtime arch to build, or all"
        required: false
        default: all
        type: string

permissions:
  contents: write

jobs:
  runtime-matrix:
    name: Prepare runtime matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        shell: python
        run: |
          import json
          import os

          targets = [
              {"os": "macos-latest", "platform": "macos", "arch": "arm64", "jobs": "3", "bazel_output_root": ".bazel-output-root", "timeout_minutes": 90},
              {"os": "macos-15-intel", "platform": "macos", "arch": "x64", "jobs": "3", "bazel_output_root": ".bazel-output-root", "timeout_minutes": 120},
              {"os": "ubuntu-latest", "platform": "linux", "arch": "x64", "jobs": "3", "bazel_output_root": ".bazel-output-root", "timeout_minutes": 90},
              {"os": "ubuntu-24.04-arm", "platform": "linux", "arch": "arm64", "jobs": "3", "bazel_output_root": ".bazel-output-root", "timeout_minutes": 90},
              {"os": "windows-latest", "platform": "windows", "arch": "x64", "jobs": "1", "bazel_output_root": "C:/bzl", "timeout_minutes": 120},
              {"os": "ubuntu-latest", "platform": "android", "arch": "arm64", "jobs": "3", "bazel_output_root": ".bazel-output-root", "timeout_minutes": 90},
              {"os": "ubuntu-latest", "platform": "android", "arch": "x64", "jobs": "3", "bazel_output_root": ".bazel-output-root", "timeout_minutes": 90},
          ]
          platform = "${{ inputs.target_platform }}"
          arch = "${{ inputs.target_arch }}"
          selected = [
              target for target in targets
              if (platform == "all" or target["platform"] == platform)
              and (arch == "all" or target["arch"] == arch)
          ]
          if not selected:
              raise SystemExit(f"No runtime targets matched {platform}/{arch}")
          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps({'include': selected})}\n")

  build-upstream-runtime:
    name: Build upstream runtime (${{ matrix.platform }}-${{ matrix.arch }})
    needs: runtime-matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.runtime-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Set up Node.js for Bazelisk fallback
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Android NDK
        id: setup-ndk
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28b
          add-to-path: false

      - name: Cache Bazel
        if: matrix.platform != 'windows' && !(matrix.platform == 'macos' && matrix.arch == 'x64') && !(matrix.platform == 'linux' && matrix.arch == 'x64')
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
            ~/Library/Caches/bazelisk
            .bazel-output-root
          key: bazel-${{ runner.os }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ inputs.upstream_tag }}-${{ hashFiles('tools/build_upstream_runtime.py') }}
          restore-keys: |
            bazel-${{ runner.os }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ inputs.upstream_tag }}-

      - name: Build upstream LiteRT-LM runtime
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          BAZEL_OUTPUT_USER_ROOT: ${{ matrix.bazel_output_root }}
        run: |
          python3 tools/build_upstream_runtime.py \
            --upstream-tag "${{ inputs.upstream_tag }}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --jobs "${{ matrix.jobs }}"

      - uses: actions/upload-artifact@v4
        with:
          name: upstream-runtime-${{ matrix.platform }}-${{ matrix.arch }}
          path: bin

  package:
    if: inputs.target_platform == 'all' && inputs.target_arch == 'all'
    needs:
      - build-upstream-runtime
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Resolve native release tag
        id: release
        shell: bash
        run: |
          release_tag="${{ inputs.release_tag }}"
          if [ -z "$release_tag" ]; then
            release_tag="${{ inputs.upstream_tag }}"
          fi
          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Package upstream prebuilt libraries
        run: |
          python3 tools/package_upstream_prebuilts.py \
            --upstream-tag "${{ inputs.upstream_tag }}" \
            --clean

      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ secrets.LITERT_LM_RELEASE_TOKEN || github.token }}
        run: |
          gh run download "${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --pattern "upstream-runtime-*" \
            --dir runtime-bin

      - name: Add upstream runtime libraries to package
        run: |
          cp -R runtime-bin/*/* bin/

      - name: Package official upstream release assets
        env:
          GH_TOKEN: ${{ secrets.LITERT_LM_RELEASE_TOKEN || github.token }}
        run: |
          python3 tools/package_official_release_assets.py \
            --upstream-tag "${{ inputs.upstream_tag }}" \
            --clean

      - name: Package official iOS runtime
        run: |
          python3 tools/package_ios_runtime.py \
            --upstream-tag "${{ inputs.upstream_tag }}" \
            --clean

      - name: Package official macOS runtime
        run: |
          python3 tools/package_macos_runtime.py \
            --upstream-tag "${{ inputs.upstream_tag }}" \
            --clean

      - name: Package Apple SPM XCFrameworks
        run: |
          python3 tools/package_apple_xcframeworks.py \
            --release-tag "${{ steps.release.outputs.tag }}" \
            --clean

      - name: Generate manifest and checksums
        run: |
          python3 tools/validate_runtime_artifacts.py --upstream-tag "${{ inputs.upstream_tag }}"
          python3 tools/validate_runtime_dependencies.py
          python3 tools/package_release.py \
            --upstream-tag "${{ inputs.upstream_tag }}" \
            --release-tag "${{ steps.release.outputs.tag }}"
          python3 tools/validate_artifacts.py

      - name: Create release archives
        run: |
          mkdir -p release
          tar -czf "release/litert-lm-native-prebuilts-${{ steps.release.outputs.tag }}.tar.gz" \
            bin manifest.json SHA256SUMS
          while IFS= read -r runtime_dir; do
            platform="$(basename "$(dirname "$runtime_dir")")"
            arch="$(basename "$runtime_dir")"
            tar -czf "release/litert-lm-native-runtime-${platform}-${arch}-${{ steps.release.outputs.tag }}.tar.gz" \
              -C bin "${platform}/${arch}"
          done < <(find bin -mindepth 2 -maxdepth 2 -type d | sort)
          if [ -d dist ]; then
            tar -czf "release/litert-lm-native-official-assets-${{ steps.release.outputs.tag }}.tar.gz" \
              dist
          fi
          if [ -d "dist/spm/${{ steps.release.outputs.tag }}" ]; then
            cp dist/spm/${{ steps.release.outputs.tag }}/*.zip release/
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.LITERT_LM_RELEASE_TOKEN || github.token }}
        run: |
          args=()
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          notes="Packaged LiteRT-LM upstream ${{ inputs.upstream_tag }} runtime libraries, upstream prebuilts, Apple SPM XCFrameworks, and official release assets as ${{ steps.release.outputs.tag }}."
          if gh release view "${{ steps.release.outputs.tag }}" \
            --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "${{ steps.release.outputs.tag }}" \
              --repo "${{ github.repository }}" \
              --title "LiteRT-LM ${{ steps.release.outputs.tag }}" \
              --notes "$notes" \
              "${args[@]}"
            intended_assets="$(mktemp)"
            {
              find release -maxdepth 1 -type f -exec basename {} \;
              printf '%s\n' manifest.json SHA256SUMS
            } | sort > "$intended_assets"
            while IFS= read -r asset; do
              if ! grep -Fxq "$asset" "$intended_assets"; then
                gh release delete-asset "${{ steps.release.outputs.tag }}" "$asset" \
                  --repo "${{ github.repository }}" \
                  --yes
              fi
            done < <(
              gh release view "${{ steps.release.outputs.tag }}" \
                --repo "${{ github.repository }}" \
                --json assets \
                --jq '.assets[].name'
            )
            gh release upload "${{ steps.release.outputs.tag }}" \
              --repo "${{ github.repository }}" \
              --clobber \
              release/* \
              manifest.json \
              SHA256SUMS
          else
            gh release create "${{ steps.release.outputs.tag }}" \
              --repo "${{ github.repository }}" \
              --title "LiteRT-LM ${{ steps.release.outputs.tag }}" \
              --notes "$notes" \
              "${args[@]}" \
              release/* \
              manifest.json \
              SHA256SUMS
          fi

      - name: Validate published GitHub release
        env:
          GH_TOKEN: ${{ secrets.LITERT_LM_RELEASE_TOKEN || github.token }}
        run: |
          rm -rf published-release-check
          mkdir -p published-release-check
          curl -L -f -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.release.outputs.tag }}" \
            -o published-release-check/release.json
          manifest_url="$(python3 - <<'PY'
          import json
          release = json.load(open('published-release-check/release.json', encoding='utf-8'))
          for asset in release.get('assets', []):
            if asset.get('name') == 'manifest.json':
              print(asset['browser_download_url'])
              break
          PY
          )"
          test -n "$manifest_url"
          curl -L -f -sS "$manifest_url" -o published-release-check/manifest.json
          python3 tools/validate_release_manifest.py \
            published-release-check/manifest.json \
            --upstream-tag "${{ inputs.upstream_tag }}" \
            --release-tag "${{ steps.release.outputs.tag }}" \
            --release-metadata published-release-check/release.json
