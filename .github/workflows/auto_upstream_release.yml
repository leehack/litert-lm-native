name: Auto Upstream Release

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Resolve latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.LITERT_LM_RELEASE_TOKEN || github.token }}
        run: |
          python3 tools/fetch_upstream.py --latest --metadata-only > upstream.json
          tag="$(python3 - <<'PY'
          import json
          print(json.load(open('upstream.json'))['tag'])
          PY
          )"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          cat upstream.json

      - name: Check existing release
        id: existing
        env:
          GH_TOKEN: ${{ secrets.LITERT_LM_RELEASE_TOKEN || github.token }}
        run: |
          rm -rf release-check
          mkdir -p release-check
          status="$(curl -L -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -o release-check/release.json \
            -w "%{http_code}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.upstream.outputs.tag }}")"
          if [ "$status" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check release completeness
        id: complete
        if: steps.existing.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.LITERT_LM_RELEASE_TOKEN || github.token }}
        run: |
          manifest_url="$(python3 - <<'PY'
          import json
          release = json.load(open('release-check/release.json', encoding='utf-8'))
          for asset in release.get('assets', []):
            if asset.get('name') == 'manifest.json':
              print(asset['browser_download_url'])
              break
          PY
          )"
          if [ -n "$manifest_url" ] && curl -L -f -sS "$manifest_url" -o release-check/manifest.json; then
            if python3 tools/validate_release_manifest.py \
              release-check/manifest.json \
              --upstream-tag "${{ steps.upstream.outputs.tag }}" \
              --release-metadata release-check/release.json; then
              echo "complete=true" >> "$GITHUB_OUTPUT"
            else
              echo "complete=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "complete=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch native release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.LITERT_LM_RELEASE_TOKEN || github.token }}
        run: |
          gh workflow run native_release.yml \
            --repo "${{ github.repository }}" \
            -f upstream_tag="${{ steps.upstream.outputs.tag }}"

      - name: Existing release is incomplete
        if: steps.existing.outputs.exists == 'true' && steps.complete.outputs.complete == 'false'
        run: |
          echo "Release ${{ steps.upstream.outputs.tag }} exists but does not match current validation."
          echo "Skipping automatic rebuild to avoid mutating an existing release tag."

      - name: No-op when release is complete
        if: steps.existing.outputs.exists == 'true' && steps.complete.outputs.complete == 'true'
        run: echo "Release ${{ steps.upstream.outputs.tag }} already exists and is complete."
