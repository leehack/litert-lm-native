name: Auto Upstream Release

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest upstream release
        id: upstream
        run: |
          python3 tools/fetch_upstream.py --latest --metadata-only > upstream.json
          tag="$(python3 - <<'PY'
          import json
          print(json.load(open('upstream.json'))['tag'])
          PY
          )"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          cat upstream.json

      - name: Check existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.upstream.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check release completeness
        id: complete
        if: steps.existing.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf release-check
          mkdir -p release-check
          if gh release download "${{ steps.upstream.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern manifest.json \
            --dir release-check; then
            if python3 tools/validate_release_manifest.py \
              release-check/manifest.json \
              --upstream-tag "${{ steps.upstream.outputs.tag }}"; then
              echo "complete=true" >> "$GITHUB_OUTPUT"
            else
              echo "complete=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "complete=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch native release
        if: steps.existing.outputs.exists == 'false' || steps.complete.outputs.complete == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run native_release.yml \
            --repo "${{ github.repository }}" \
            -f upstream_tag="${{ steps.upstream.outputs.tag }}"

      - name: No-op when release is complete
        if: steps.existing.outputs.exists == 'true' && steps.complete.outputs.complete == 'true'
        run: echo "Release ${{ steps.upstream.outputs.tag }} already exists and is complete."
