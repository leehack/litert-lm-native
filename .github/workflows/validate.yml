name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD
      - name: Validate release metadata
        run: |
          python3 tools/package_release.py --upstream-tag v0.12.0
          python3 tools/validate_artifacts.py
          python3 tools/validate_runtime_dependencies.py
      - name: Validate Python tooling
        run: |
          python3 -m py_compile \
            tools/runtime_dependency_utils.py \
            tools/fetch_upstream.py \
            tools/build_stream_proxy.py \
            tools/build_upstream_runtime.py \
            tools/package_release.py \
            tools/validate_artifacts.py \
            tools/package_upstream_prebuilts.py \
            tools/package_official_release_assets.py \
            tools/package_ios_runtime.py \
            tools/validate_runtime_artifacts.py \
            tools/validate_runtime_dependencies.py \
            tools/validate_release_manifest.py
      - name: Build StreamProxy smoke
        run: |
          python3 tools/build_stream_proxy.py \
            --platform macos \
            --arch arm64 \
            --output-dir "$RUNNER_TEMP/stream-proxy"
          python3 tools/build_stream_proxy.py \
            --platform ios \
            --arch arm64-sim \
            --output-dir "$RUNNER_TEMP/stream-proxy"
      - name: Web scaffold self-test
        run: node web/src/index.js --self-test
